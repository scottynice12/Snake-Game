<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake — SGC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e0e0e;
      color: #f0f0f0;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #1D9E75;
      margin-bottom: 0.25rem;
    }

    .tagline {
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 0.1em;
      margin-bottom: 1.25rem;
    }

    #score-row {
      display: flex;
      gap: 2.5rem;
      margin-bottom: 1rem;
    }

    .stat { text-align: center; }
    .stat-label {
      font-size: 0.65rem;
      color: #555;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .stat-val {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f0f0f0;
    }

    #canvas-wrap { position: relative; }

    canvas {
      display: block;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      background: #141414;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.6);
      border-radius: 8px;
    }

    #overlay-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1D9E75;
      margin-bottom: 0.4rem;
      letter-spacing: 0.1em;
    }

    #overlay-sub {
      font-size: 0.8rem;
      color: #888;
      letter-spacing: 0.05em;
    }

    #controls {
      display: flex;
      gap: 10px;
      margin-top: 1rem;
    }

    #controls button {
      padding: 8px 22px;
      font-family: inherit;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      background: transparent;
      color: #f0f0f0;
      border: 1px solid #333;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    #controls button:hover { background: #1a1a1a; border-color: #555; }
    #controls button:active { transform: scale(0.97); }

    #dpad {
      display: grid;
      grid-template-columns: repeat(3, 46px);
      grid-template-rows: repeat(3, 46px);
      gap: 5px;
      margin-top: 1rem;
    }

    #dpad button {
      width: 46px;
      height: 46px;
      font-size: 1.1rem;
      background: #1a1a1a;
      color: #f0f0f0;
      border: 1px solid #333;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s;
    }

    #dpad button:hover { background: #252525; }
    #dpad button:active { transform: scale(0.93); background: #1D9E75; color: #000; }

    .hint {
      margin-top: 1.25rem;
      font-size: 0.65rem;
      color: #3a3a3a;
      letter-spacing: 0.07em;
    }
  </style>
</head>
<body>

  <h1>SNAKE</h1>
  <p class="tagline">SGC / scottynice12</p>

  <div id="score-row">
    <div class="stat"><div class="stat-label">Score</div><div class="stat-val" id="score">0</div></div>
    <div class="stat"><div class="stat-label">Best</div><div class="stat-val" id="best">0</div></div>
    <div class="stat"><div class="stat-label">Level</div><div class="stat-val" id="level">1</div></div>
  </div>

  <div id="canvas-wrap">
    <canvas id="canvas" width="360" height="360"></canvas>
    <div id="overlay">
      <div id="overlay-title">SNAKE</div>
      <div id="overlay-sub">Press Space or tap Start</div>
    </div>
  </div>

  <div id="controls">
    <button id="btn-start">Start</button>
    <button id="btn-pause">Pause</button>
  </div>

  <div id="dpad">
    <button style="grid-column:2;grid-row:1" id="up"    aria-label="Up">↑</button>
    <button style="grid-column:1;grid-row:2" id="left"  aria-label="Left">←</button>
    <button style="grid-column:3;grid-row:2" id="right" aria-label="Right">→</button>
    <button style="grid-column:2;grid-row:3" id="down"  aria-label="Down">↓</button>
  </div>

  <p class="hint">Arrow keys · Space to start/pause</p>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    const COLS = 18, ROWS = 18;
    const CW = canvas.width / COLS;
    const CH = canvas.height / ROWS;

    let snake, dir, nextDir, food, score, best, level, speed, loop, state;
    best = 0;

    function init() {
      snake   = [{x:9,y:9},{x:8,y:9},{x:7,y:9}];
      dir     = {x:1, y:0};
      nextDir = {x:1, y:0};
      score   = 0; level = 1; speed = 160;
      document.getElementById('score').textContent = '0';
      document.getElementById('level').textContent = '1';
      placeFood();
    }

    function placeFood() {
      let pos;
      do { pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)}; }
      while (snake.some(s => s.x===pos.x && s.y===pos.y));
      food = pos;
    }

    function roundRect(x,y,w,h,r) {
      ctx.beginPath();
      ctx.moveTo(x+r,y);
      ctx.lineTo(x+w-r,y);
      ctx.quadraticCurveTo(x+w,y,x+w,y+r);
      ctx.lineTo(x+w,y+h-r);
      ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
      ctx.lineTo(x+r,y+h);
      ctx.quadraticCurveTo(x,y+h,x,y+h-r);
      ctx.lineTo(x,y+r);
      ctx.quadraticCurveTo(x,y,x+r,y);
      ctx.closePath();
    }

    function draw() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = '#141414';
      ctx.fillRect(0,0,canvas.width,canvas.height);

      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 0.5;
      for(let i=0;i<=COLS;i++){ctx.beginPath();ctx.moveTo(i*CW,0);ctx.lineTo(i*CW,canvas.height);ctx.stroke();}
      for(let j=0;j<=ROWS;j++){ctx.beginPath();ctx.moveTo(0,j*CH);ctx.lineTo(canvas.width,j*CH);ctx.stroke();}

      snake.forEach((seg,i) => {
        ctx.fillStyle = i===0 ? '#0F6E56' : '#1D9E75';
        ctx.globalAlpha = i===0 ? 1 : Math.max(0.35, 1 - i*0.03);
        roundRect(seg.x*CW+1.5, seg.y*CH+1.5, CW-3, CH-3, 4);
        ctx.fill();
      });
      ctx.globalAlpha = 1;

      const fx = food.x*CW+CW/2, fy = food.y*CH+CH/2, fr = CW*0.34;
      ctx.fillStyle = '#D85A30';
      ctx.beginPath(); ctx.arc(fx, fy, fr, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#F0997B';
      ctx.beginPath(); ctx.arc(fx-fr*0.25, fy-fr*0.28, fr*0.28, 0, Math.PI*2); ctx.fill();
    }

    function step() {
      dir = nextDir;
      const head = {x: snake[0].x+dir.x, y: snake[0].y+dir.y};

      if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)){
        endGame(); return;
      }

      snake.unshift(head);
      if(head.x===food.x && head.y===food.y){
        score += level * 10;
        document.getElementById('score').textContent = score;
        if(score > best){ best = score; document.getElementById('best').textContent = best; }
        level = Math.floor(score/100)+1;
        document.getElementById('level').textContent = level;
        speed = Math.max(60, 160-(level-1)*15);
        placeFood();
        clearInterval(loop);
        loop = setInterval(step, speed);
      } else {
        snake.pop();
      }
      draw();
    }

    function endGame() {
      clearInterval(loop);
      state = 'dead';
      draw();
      const ov = document.getElementById('overlay');
      document.getElementById('overlay-title').textContent = 'GAME OVER';
      document.getElementById('overlay-sub').textContent   = 'Space or Start to retry';
      ov.style.display = 'flex';
    }

    function startGame() {
      clearInterval(loop);
      init(); draw();
      state = 'playing';
      document.getElementById('overlay').style.display = 'none';
      loop = setInterval(step, speed);
    }

    function togglePause() {
      if(state==='playing'){
        clearInterval(loop); state='paused';
        document.getElementById('overlay-title').textContent = 'PAUSED';
        document.getElementById('overlay-sub').textContent   = 'Space to resume';
        document.getElementById('overlay').style.display = 'flex';
      } else if(state==='paused'){
        document.getElementById('overlay').style.display = 'none';
        loop = setInterval(step, speed); state='playing';
      }
    }

    document.getElementById('btn-start').addEventListener('click', startGame);
    document.getElementById('btn-pause').addEventListener('click', togglePause);

    document.addEventListener('keydown', e => {
      if(e.code==='Space'){ e.preventDefault(); if(state!=='playing') startGame(); else togglePause(); return; }
      if(state!=='playing') return;
      if(e.key==='ArrowUp'    && dir.y!==1)  { nextDir={x:0,y:-1}; e.preventDefault(); }
      if(e.key==='ArrowDown'  && dir.y!==-1) { nextDir={x:0,y:1};  e.preventDefault(); }
      if(e.key==='ArrowLeft'  && dir.x!==1)  { nextDir={x:-1,y:0}; e.preventDefault(); }
      if(e.key==='ArrowRight' && dir.x!==-1) { nextDir={x:1,y:0};  e.preventDefault(); }
    });

    document.getElementById('up').addEventListener('click',    () => { if(dir.y!==1)  nextDir={x:0,y:-1}; if(state!=='playing') startGame(); });
    document.getElementById('down').addEventListener('click',  () => { if(dir.y!==-1) nextDir={x:0,y:1};  if(state!=='playing') startGame(); });
    document.getElementById('left').addEventListener('click',  () => { if(dir.x!==1)  nextDir={x:-1,y:0}; if(state!=='playing') startGame(); });
    document.getElementById('right').addEventListener('click', () => { if(dir.x!==-1) nextDir={x:1,y:0};  if(state!=='playing') startGame(); });

    state = 'idle';
    init(); draw();
  </script>
</body>
</html>
